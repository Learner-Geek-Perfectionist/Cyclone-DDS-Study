<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1050 1520" width="1050" height="1520">
  <defs>
    <marker id="arrow" markerWidth="8" markerHeight="6" refX="8" refY="3" orient="auto">
      <path d="M0,0 L8,3 L0,6" fill="#e74c3c"/>
    </marker>
    <marker id="arrow-blue" markerWidth="8" markerHeight="6" refX="8" refY="3" orient="auto">
      <path d="M0,0 L8,3 L0,6" fill="#3498db"/>
    </marker>
    <marker id="arrow-green" markerWidth="8" markerHeight="6" refX="8" refY="3" orient="auto">
      <path d="M0,0 L8,3 L0,6" fill="#a6e3a1"/>
    </marker>
    <marker id="arrow-gray" markerWidth="8" markerHeight="6" refX="8" refY="3" orient="auto">
      <path d="M0,0 L8,3 L0,6" fill="#6c7086"/>
    </marker>
  </defs>

  <rect width="1050" height="1520" fill="#1e1e2e"/>

  <!-- Title -->
  <text x="525" y="35" fill="#cdd6f4" font-family="Consolas, monospace" font-size="18" text-anchor="middle" font-weight="bold">rdata Pipeline: defrag -&gt; reorder -&gt; dqueue</text>
  <text x="525" y="55" fill="#6c7086" font-family="Consolas, monospace" font-size="12" text-anchor="middle">rmsg refcount = UNCOMMITTED_BIAS + sum(RDATA_BIAS) + actual_refs</text>

  <!-- ============ PHASE 0: rmsg_new ============ -->
  <rect x="30" y="75" width="990" height="75" rx="6" fill="#181825" stroke="#89b4fa" stroke-width="1.5"/>
  <text x="45" y="95" fill="#89b4fa" font-family="Consolas, monospace" font-size="13" font-weight="bold">Phase 0: ddsi_rmsg_new(rbpool)</text>
  <text x="45" y="115" fill="#cdd6f4" font-family="Consolas, monospace" font-size="11">refcount = UNCOMMITTED_BIAS (0x80000000)</text>
  <text x="45" y="135" fill="#6c7086" font-family="Consolas, monospace" font-size="10">ddsi_radmin.c:539  ddsrt_atomic_st32(&amp;rmsg-&gt;refcount, RMSG_REFCOUNT_UNCOMMITTED_BIAS)</text>

  <!-- ============ PHASE 1: rdata_new ============ -->
  <rect x="30" y="165" width="990" height="75" rx="6" fill="#181825" stroke="#fab387" stroke-width="1.5"/>
  <text x="45" y="185" fill="#fab387" font-family="Consolas, monospace" font-size="13" font-weight="bold">Phase 1: ddsi_rdata_new(rmsg, ...) -- per Data/DataFrag submsg</text>
  <text x="45" y="205" fill="#cdd6f4" font-family="Consolas, monospace" font-size="11">rdata created, rdata-&gt;rmsg = rmsg (back-pointer, no refcount change yet)</text>
  <text x="45" y="225" fill="#6c7086" font-family="Consolas, monospace" font-size="10">ddsi_radmin.c:719  d-&gt;rmsg = rmsg    (refcount unchanged)</text>

  <!-- ============ PHASE 2: defrag ============ -->
  <rect x="30" y="255" width="990" height="175" rx="6" fill="#181825" stroke="#a6e3a1" stroke-width="1.5"/>
  <text x="45" y="278" fill="#a6e3a1" font-family="Consolas, monospace" font-size="13" font-weight="bold">Phase 2: ddsi_defrag_rsample(defrag, rdata, sampleinfo)</text>

  <!-- addbias box -->
  <rect x="60" y="290" width="940" height="50" rx="4" fill="#313244" stroke="#f9e2af" stroke-width="1" stroke-dasharray="4,2"/>
  <text x="75" y="310" fill="#f9e2af" font-family="Consolas, monospace" font-size="12" font-weight="bold">+RDATA_BIAS (0x00100000) per rdata stored in fragtree</text>
  <text x="75" y="326" fill="#6c7086" font-family="Consolas, monospace" font-size="10">ddsi_radmin.c:1028  ddsi_rdata_addbias(rdata)  -- inside defrag_rsample_addiv()</text>

  <text x="60" y="358" fill="#cdd6f4" font-family="Consolas, monospace" font-size="11">refcount = UNCOMMITTED_BIAS + N * RDATA_BIAS  (N = number of rdata stored)</text>
  <text x="60" y="378" fill="#6c7086" font-family="Consolas, monospace" font-size="10">Also at: :1100 (reorder_rsample_new), :1216 (grow predeq), :1244 (extend succ)</text>

  <!-- Branch: incomplete vs complete -->
  <text x="60" y="410" fill="#cdd6f4" font-family="Consolas, monospace" font-size="11">if incomplete: rdata stays in fragtree, return NULL, wait for more fragments</text>
  <text x="60" y="425" fill="#cdd6f4" font-family="Consolas, monospace" font-size="11">if complete:   rsample_convert_defrag_to_reorder(), return rsample</text>

  <!-- ============ PHASE 3: reorder ============ -->
  <rect x="30" y="445" width="990" height="220" rx="6" fill="#181825" stroke="#cba6f7" stroke-width="1.5"/>
  <text x="45" y="468" fill="#cba6f7" font-family="Consolas, monospace" font-size="13" font-weight="bold">Phase 3: ddsi_reorder_rsample(&amp;sc, reorder, sample, &amp;refcount_adjust)</text>

  <text x="60" y="494" fill="#cdd6f4" font-family="Consolas, monospace" font-size="11">refcount_adjust starts at 0 (initialized by caller)</text>

  <!-- Case: stored -->
  <rect x="60" y="508" width="450" height="60" rx="4" fill="#313244" stroke="#6c7086" stroke-width="1"/>
  <text x="75" y="528" fill="#cdd6f4" font-family="Consolas, monospace" font-size="11">Case ACCEPT: stored in sampleivtree</text>
  <text x="75" y="546" fill="#f9e2af" font-family="Consolas, monospace" font-size="11">refcount_adjust++ (:2143)</text>
  <text x="75" y="560" fill="#6c7086" font-family="Consolas, monospace" font-size="10">(sample kept, needs ref later)</text>

  <!-- Case: deliver -->
  <rect x="530" y="508" width="470" height="60" rx="4" fill="#313244" stroke="#6c7086" stroke-width="1"/>
  <text x="545" y="528" fill="#cdd6f4" font-family="Consolas, monospace" font-size="11">Case DELIVER: return consecutive chain</text>
  <text x="545" y="546" fill="#f9e2af" font-family="Consolas, monospace" font-size="11">refcount_adjust++ (:1962)</text>
  <text x="545" y="560" fill="#6c7086" font-family="Consolas, monospace" font-size="10">(chain goes to dqueue, needs ref)</text>

  <!-- After all reorders -->
  <rect x="60" y="582" width="940" height="70" rx="4" fill="#313244" stroke="#f38ba8" stroke-width="1.5"/>
  <text x="75" y="602" fill="#f38ba8" font-family="Consolas, monospace" font-size="12" font-weight="bold">ddsi_fragchain_adjust_refcount(fragchain, refcount_adjust)</text>
  <text x="75" y="620" fill="#cdd6f4" font-family="Consolas, monospace" font-size="11">For each rdata: rmsg.refcount -= (RDATA_BIAS - refcount_adjust)</text>
  <text x="75" y="638" fill="#6c7086" font-family="Consolas, monospace" font-size="10">ddsi_radmin.c:907-915  rmbias_and_adjust: sub = RDATA_BIAS - adjust (:658)</text>

  <!-- ============ PHASE 4: rmsg_commit ============ -->
  <rect x="30" y="680" width="990" height="100" rx="6" fill="#181825" stroke="#89b4fa" stroke-width="1.5"/>
  <text x="45" y="703" fill="#89b4fa" font-family="Consolas, monospace" font-size="13" font-weight="bold">Phase 4: ddsi_rmsg_commit(rmsg)</text>

  <rect x="60" y="715" width="940" height="50" rx="4" fill="#313244" stroke="#f9e2af" stroke-width="1" stroke-dasharray="4,2"/>
  <text x="75" y="735" fill="#f9e2af" font-family="Consolas, monospace" font-size="12" font-weight="bold">-UNCOMMITTED_BIAS (0x80000000)</text>
  <text x="75" y="751" fill="#6c7086" font-family="Consolas, monospace" font-size="10">ddsi_radmin.c:624  ddsrt_atomic_sub32_nv(&amp;rmsg-&gt;refcount, RMSG_REFCOUNT_UNCOMMITTED_BIAS)</text>

  <!-- ============ PHASE 5: dqueue ============ -->
  <rect x="30" y="795" width="990" height="130" rx="6" fill="#181825" stroke="#74c7ec" stroke-width="1.5"/>
  <text x="45" y="818" fill="#74c7ec" font-family="Consolas, monospace" font-size="13" font-weight="bold">Phase 5: dqueue delivery thread</text>

  <text x="60" y="845" fill="#cdd6f4" font-family="Consolas, monospace" font-size="11">handler(sampleinfo, fragchain, ...)  -- deliver to RHC</text>

  <rect x="60" y="860" width="940" height="50" rx="4" fill="#313244" stroke="#f9e2af" stroke-width="1" stroke-dasharray="4,2"/>
  <text x="75" y="880" fill="#f9e2af" font-family="Consolas, monospace" font-size="12" font-weight="bold">ddsi_fragchain_unref(fragchain): rmsg.refcount-- per rdata</text>
  <text x="75" y="896" fill="#6c7086" font-family="Consolas, monospace" font-size="10">ddsi_radmin.c:1692-1700  rdata_unref -&gt; rmsg_unref -&gt; refcount--</text>

  <!-- ============ PHASE 6: free ============ -->
  <rect x="30" y="940" width="990" height="75" rx="6" fill="#181825" stroke="#f38ba8" stroke-width="1.5"/>
  <text x="45" y="963" fill="#f38ba8" font-family="Consolas, monospace" font-size="13" font-weight="bold">Phase 6: refcount == 0 -&gt; ddsi_rmsg_free(rmsg)</text>
  <text x="60" y="985" fill="#cdd6f4" font-family="Consolas, monospace" font-size="11">Each chunk: ddsi_rbuf_release(chunk-&gt;rbuf) -&gt; n_live_rmsg_chunks--</text>
  <text x="60" y="1000" fill="#6c7086" font-family="Consolas, monospace" font-size="10">ddsi_radmin.c:575-593 (rmsg_free), :463-471 (rbuf_release)</text>

  <!-- ============ REFCOUNT TIMELINE ============ -->
  <rect x="30" y="1035" width="990" height="310" rx="6" fill="#181825" stroke="#89b4fa" stroke-width="1"/>
  <text x="525" y="1060" fill="#89b4fa" font-family="Consolas, monospace" font-size="14" text-anchor="middle" font-weight="bold">Refcount Timeline (example: 1 rmsg, 2 rdata, 1 reorder)</text>

  <!-- Timeline axis -->
  <line x1="80" y1="1310" x2="980" y2="1310" stroke="#6c7086" stroke-width="1"/>

  <!-- Timeline labels -->
  <text x="110" y="1330" fill="#6c7086" font-family="Consolas, monospace" font-size="9" text-anchor="middle">rmsg_new</text>
  <text x="240" y="1330" fill="#6c7086" font-family="Consolas, monospace" font-size="9" text-anchor="middle">addbias</text>
  <text x="310" y="1330" fill="#6c7086" font-family="Consolas, monospace" font-size="9" text-anchor="middle">addbias</text>
  <text x="460" y="1330" fill="#6c7086" font-family="Consolas, monospace" font-size="9" text-anchor="middle">reorder</text>
  <text x="570" y="1330" fill="#6c7086" font-family="Consolas, monospace" font-size="9" text-anchor="middle">adjust</text>
  <text x="680" y="1330" fill="#6c7086" font-family="Consolas, monospace" font-size="9" text-anchor="middle">commit</text>
  <text x="790" y="1330" fill="#6c7086" font-family="Consolas, monospace" font-size="9" text-anchor="middle">unref x1</text>
  <text x="900" y="1330" fill="#6c7086" font-family="Consolas, monospace" font-size="9" text-anchor="middle">unref x1</text>

  <!-- Tick marks -->
  <line x1="110" y1="1305" x2="110" y2="1315" stroke="#6c7086" stroke-width="1"/>
  <line x1="240" y1="1305" x2="240" y2="1315" stroke="#6c7086" stroke-width="1"/>
  <line x1="310" y1="1305" x2="310" y2="1315" stroke="#6c7086" stroke-width="1"/>
  <line x1="460" y1="1305" x2="460" y2="1315" stroke="#6c7086" stroke-width="1"/>
  <line x1="570" y1="1305" x2="570" y2="1315" stroke="#6c7086" stroke-width="1"/>
  <line x1="680" y1="1305" x2="680" y2="1315" stroke="#6c7086" stroke-width="1"/>
  <line x1="790" y1="1305" x2="790" y2="1315" stroke="#6c7086" stroke-width="1"/>
  <line x1="900" y1="1305" x2="900" y2="1315" stroke="#6c7086" stroke-width="1"/>

  <!-- Refcount bars (heights proportional) -->
  <!-- U = UNCOMMITTED = 200px, R = RDATA_BIAS = 30px, actual = 15px -->

  <!-- rmsg_new: U -->
  <rect x="95" y="1100" width="30" height="200" fill="#89b4fa" opacity="0.7"/>
  <text x="110" y="1095" fill="#89b4fa" font-family="Consolas, monospace" font-size="10" text-anchor="middle">U</text>

  <!-- addbias rdata1: U + R -->
  <rect x="225" y="1100" width="30" height="200" fill="#89b4fa" opacity="0.7"/>
  <rect x="225" y="1070" width="30" height="30" fill="#fab387" opacity="0.7"/>
  <text x="240" y="1065" fill="#fab387" font-family="Consolas, monospace" font-size="10" text-anchor="middle">U+R</text>

  <!-- addbias rdata2: U + 2R -->
  <rect x="295" y="1100" width="30" height="200" fill="#89b4fa" opacity="0.7"/>
  <rect x="295" y="1040" width="30" height="60" fill="#fab387" opacity="0.7"/>
  <text x="310" y="1035" fill="#fab387" font-family="Consolas, monospace" font-size="10" text-anchor="middle">U+2R</text>

  <!-- reorder (refcount_adjust=1): U + 2R -->
  <rect x="445" y="1100" width="30" height="200" fill="#89b4fa" opacity="0.7"/>
  <rect x="445" y="1040" width="30" height="60" fill="#fab387" opacity="0.7"/>
  <text x="460" y="1035" fill="#cba6f7" font-family="Consolas, monospace" font-size="10" text-anchor="middle">U+2R</text>
  <text x="460" y="1025" fill="#6c7086" font-family="Consolas, monospace" font-size="8" text-anchor="middle">adj=1</text>

  <!-- adjust_refcount: sub = R - 1 per rdata => U + 2*1 = U + 2 -->
  <rect x="555" y="1100" width="30" height="200" fill="#89b4fa" opacity="0.7"/>
  <rect x="555" y="1070" width="30" height="30" fill="#a6e3a1" opacity="0.7"/>
  <text x="570" y="1065" fill="#a6e3a1" font-family="Consolas, monospace" font-size="10" text-anchor="middle">U+2</text>

  <!-- commit: remove U => 2 -->
  <rect x="665" y="1285" width="30" height="25" fill="#a6e3a1" opacity="0.7"/>
  <text x="680" y="1280" fill="#a6e3a1" font-family="Consolas, monospace" font-size="10" text-anchor="middle">2</text>

  <!-- unref x1: 1 -->
  <rect x="775" y="1297" width="30" height="13" fill="#a6e3a1" opacity="0.7"/>
  <text x="790" y="1292" fill="#a6e3a1" font-family="Consolas, monospace" font-size="10" text-anchor="middle">1</text>

  <!-- unref x2: 0 -->
  <text x="900" y="1292" fill="#f38ba8" font-family="Consolas, monospace" font-size="11" text-anchor="middle">0 -&gt; FREE</text>

  <!-- Legend for timeline -->
  <rect x="700" y="1080" width="12" height="12" fill="#89b4fa" opacity="0.7"/>
  <text x="718" y="1091" fill="#6c7086" font-family="Consolas, monospace" font-size="10">UNCOMMITTED_BIAS (2^31)</text>
  <rect x="700" y="1098" width="12" height="12" fill="#fab387" opacity="0.7"/>
  <text x="718" y="1109" fill="#6c7086" font-family="Consolas, monospace" font-size="10">RDATA_BIAS (2^20 each)</text>
  <rect x="700" y="1116" width="12" height="12" fill="#a6e3a1" opacity="0.7"/>
  <text x="718" y="1127" fill="#6c7086" font-family="Consolas, monospace" font-size="10">actual refs (1 each)</text>

  <!-- ============ FLOW ARROWS (left side) ============ -->
  <line x1="15" y1="150" x2="15" y2="245" stroke="#e74c3c" stroke-width="2" marker-end="url(#arrow)"/>
  <line x1="15" y1="250" x2="15" y2="435" stroke="#e74c3c" stroke-width="2" marker-end="url(#arrow)"/>
  <line x1="15" y1="440" x2="15" y2="670" stroke="#e74c3c" stroke-width="2" marker-end="url(#arrow)"/>
  <line x1="15" y1="675" x2="15" y2="785" stroke="#e74c3c" stroke-width="2" marker-end="url(#arrow)"/>
  <line x1="15" y1="790" x2="15" y2="930" stroke="#e74c3c" stroke-width="2" marker-end="url(#arrow)"/>
  <line x1="15" y1="935" x2="15" y2="1020" stroke="#e74c3c" stroke-width="2" marker-end="url(#arrow)"/>

  <!-- Thread labels -->
  <text x="1010" y="115" fill="#89b4fa" font-family="Consolas, monospace" font-size="9" text-anchor="end" transform="rotate(-90, 1010, 115)">recv thread</text>
  <text x="1010" y="850" fill="#74c7ec" font-family="Consolas, monospace" font-size="9" text-anchor="end" transform="rotate(-90, 1010, 850)">dqueue thread</text>

  <!-- Thread boundary -->
  <line x1="35" y1="787" x2="1015" y2="787" stroke="#f9e2af" stroke-width="1" stroke-dasharray="6,3"/>
  <text x="525" y="783" fill="#f9e2af" font-family="Consolas, monospace" font-size="10" text-anchor="middle">--- thread boundary (recv -&gt; dqueue) ---</text>

  <!-- ============ BOTTOM LEGEND ============ -->
  <rect x="30" y="1360" width="990" height="145" rx="6" fill="#181825" stroke="#6c7086" stroke-width="1"/>
  <text x="45" y="1385" fill="#cdd6f4" font-family="Consolas, monospace" font-size="12" font-weight="bold">Key Insight: Why RDATA_BIAS?</text>

  <text x="45" y="1408" fill="#cdd6f4" font-family="Consolas, monospace" font-size="11">Problem: rdata may go to N reorder admins. Can't know final ref count until all are done.</text>
  <text x="45" y="1426" fill="#cdd6f4" font-family="Consolas, monospace" font-size="11">Solution: addbias gives a "large credit" (2^20). Each reorder that keeps it increments</text>
  <text x="45" y="1444" fill="#cdd6f4" font-family="Consolas, monospace" font-size="11">  refcount_adjust. After all reorders: rmbias_and_adjust does ONE atomic op:</text>
  <text x="45" y="1466" fill="#f9e2af" font-family="Consolas, monospace" font-size="12">  refcount -= (RDATA_BIAS - refcount_adjust)  =  remove credit, keep actual refs</text>
  <text x="45" y="1490" fill="#6c7086" font-family="Consolas, monospace" font-size="10">This prevents the dqueue thread from freeing rmsg while recv thread still iterates readers.</text>
</svg>
