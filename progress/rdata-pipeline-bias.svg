<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1050 1756" width="1050" height="1756">
  <defs>
    <marker id="arrow" markerWidth="8" markerHeight="6" refX="8" refY="3" orient="auto">
      <path d="M0,0 L8,3 L0,6" fill="#e74c3c"/>
    </marker>
    <marker id="arrow-blue" markerWidth="8" markerHeight="6" refX="8" refY="3" orient="auto">
      <path d="M0,0 L8,3 L0,6" fill="#3498db"/>
    </marker>
    <marker id="arrow-green" markerWidth="8" markerHeight="6" refX="8" refY="3" orient="auto">
      <path d="M0,0 L8,3 L0,6" fill="#a6e3a1"/>
    </marker>
    <marker id="arrow-gray" markerWidth="8" markerHeight="6" refX="8" refY="3" orient="auto">
      <path d="M0,0 L8,3 L0,6" fill="#6c7086"/>
    </marker>
  </defs>

  <rect width="1050" height="1736" fill="#1e1e2e"/>

  <!-- Title -->
  <text x="525" y="35" fill="#cdd6f4" font-family="Consolas, monospace" font-size="18" text-anchor="middle" font-weight="bold">rdata Pipeline: defrag -&gt; reorder -&gt; dqueue</text>
  <text x="525" y="55" fill="#6c7086" font-family="Consolas, monospace" font-size="12" text-anchor="middle">rmsg refcount = UNCOMMITTED_BIAS + sum(RDATA_BIAS) + actual_refs</text>

  <!-- ============ PHASE 0: rmsg_new ============ -->
  <rect x="30" y="75" width="990" height="75" rx="6" fill="#181825" stroke="#89b4fa" stroke-width="1.5"/>
  <text x="45" y="95" fill="#89b4fa" font-family="Consolas, monospace" font-size="13" font-weight="bold">Phase 0: ddsi_rmsg_new(rbpool)</text>
  <text x="45" y="115" fill="#cdd6f4" font-family="Consolas, monospace" font-size="11">refcount initialized to UNCOMMITTED_BIAS = 0x80000000</text>
  <text x="45" y="135" fill="#6c7086" font-family="Consolas, monospace" font-size="10">ddsi_radmin.c:539  ddsrt_atomic_st32(&amp;rmsg-&gt;refcount, RMSG_REFCOUNT_UNCOMMITTED_BIAS)</text>

  <!-- ============ PHASE 1: rdata_new ============ -->
  <rect x="30" y="165" width="990" height="85" rx="6" fill="#181825" stroke="#fab387" stroke-width="1.5"/>
  <text x="45" y="185" fill="#fab387" font-family="Consolas, monospace" font-size="13" font-weight="bold">Phase 1: ddsi_rdata_new(rmsg, ...) -- per Data/DataFrag submsg</text>
  <text x="45" y="205" fill="#cdd6f4" font-family="Consolas, monospace" font-size="11">rdata allocated in chunk, with back-pointer to rmsg. refcount unchanged.</text>
  <text x="45" y="221" fill="#6c7086" font-family="Consolas, monospace" font-size="10">ddsi_radmin.c:719  if ((d = ddsi_rmsg_alloc (rmsg, sizeof (*d))) == NULL) return NULL;</text>
  <text x="45" y="237" fill="#6c7086" font-family="Consolas, monospace" font-size="10">ddsi_radmin.c:721  d-&gt;rmsg = rmsg;</text>

  <!-- ============ PHASE 2: defrag ============ -->
  <rect x="30" y="255" width="990" height="361" rx="6" fill="#181825" stroke="#a6e3a1" stroke-width="1.5"/>
  <text x="45" y="278" fill="#a6e3a1" font-family="Consolas, monospace" font-size="13" font-weight="bold">Phase 2: ddsi_defrag_rsample(defrag, rdata, sampleinfo)</text>

  <!-- addbias box with all 4 call sites -->
  <rect x="60" y="290" width="940" height="256" rx="4" fill="#313244" stroke="#f9e2af" stroke-width="1" stroke-dasharray="4,2"/>
  <text x="75" y="308" fill="#f9e2af" font-family="Consolas, monospace" font-size="12" font-weight="bold">+RDATA_BIAS (0x00100000) per rdata stored</text>
  <text x="75" y="326" fill="#cdd6f4" font-family="Consolas, monospace" font-size="11">refcount = UNCOMMITTED_BIAS + N * RDATA_BIAS (N = number of rdata stored)</text>

  <line x1="75" y1="338" x2="985" y2="338" stroke="#45475a" stroke-width="1"/>

  <!-- Call site [1] -->
  <text x="75" y="354" fill="#94e2d5" font-family="Consolas, monospace" font-size="11">defrag_rsample_addiv(sample, rdata, path) -- new interval node in fragtree:</text>
  <text x="90" y="370" fill="#6c7086" font-family="Consolas, monospace" font-size="10">ddsi_radmin.c:1028  ddsi_rdata_addbias(rdata);</text>
  <text x="90" y="384" fill="#6c7086" font-family="Consolas, monospace" font-size="10">ddsi_radmin.c:1029  ddsrt_avl_insert_ipath(&amp;..._treedef, &amp;sample-&gt;fragtree, newiv, path);</text>

  <!-- Call site [2] -->
  <text x="75" y="404" fill="#94e2d5" font-family="Consolas, monospace" font-size="11">defrag_add_fragment(defrag, sample, rdata, sampleinfo) -- grow predeq at tail:</text>
  <text x="90" y="420" fill="#6c7086" font-family="Consolas, monospace" font-size="10">ddsi_radmin.c:1216  ddsi_rdata_addbias(rdata);</text>
  <text x="90" y="434" fill="#6c7086" font-family="Consolas, monospace" font-size="10">ddsi_radmin.c:1228  predeq-&gt;last = rdata; predeq-&gt;maxp1 = maxp1;</text>

  <!-- Call site [3] -->
  <text x="75" y="454" fill="#94e2d5" font-family="Consolas, monospace" font-size="11">defrag_add_fragment(defrag, sample, rdata, sampleinfo) -- extend succ at head:</text>
  <text x="90" y="470" fill="#6c7086" font-family="Consolas, monospace" font-size="10">ddsi_radmin.c:1244  ddsi_rdata_addbias(rdata);</text>
  <text x="90" y="484" fill="#6c7086" font-family="Consolas, monospace" font-size="10">ddsi_radmin.c:1246  succ-&gt;first = rdata; succ-&gt;min = min;</text>

  <!-- Call site [4] -->
  <text x="75" y="504" fill="#94e2d5" font-family="Consolas, monospace" font-size="11">reorder_rsample_new(rdata, sampleinfo) -- non-fragment, bypass defrag:</text>
  <text x="90" y="520" fill="#6c7086" font-family="Consolas, monospace" font-size="10">ddsi_radmin.c:1094  sce-&gt;fragchain = rdata;</text>
  <text x="90" y="534" fill="#6c7086" font-family="Consolas, monospace" font-size="10">ddsi_radmin.c:1100  ddsi_rdata_addbias(rdata);</text>

  <!-- Branch: incomplete vs complete -->
  <text x="60" y="572" fill="#f9e2af" font-family="Consolas, monospace" font-size="11" font-weight="bold">Return value:</text>
  <text x="60" y="590" fill="#6c7086" font-family="Consolas, monospace" font-size="10">incomplete -&gt; return NULL;   // rdata stays in fragtree, wait for more fragments</text>
  <text x="60" y="606" fill="#6c7086" font-family="Consolas, monospace" font-size="10">complete   -&gt; rsample_convert_defrag_to_reorder(sample);  return rsample;</text>

  <!-- ============ PHASE 3: reorder ============ -->
  <rect x="30" y="631" width="990" height="220" rx="6" fill="#181825" stroke="#cba6f7" stroke-width="1.5"/>
  <text x="45" y="654" fill="#cba6f7" font-family="Consolas, monospace" font-size="13" font-weight="bold">Phase 3: ddsi_reorder_rsample(&amp;sc, reorder, sample, &amp;refcount_adjust)</text>

  <text x="60" y="680" fill="#cdd6f4" font-family="Consolas, monospace" font-size="11">refcount_adjust starts at 0, initialized by caller before calling reorder</text>

  <!-- Case: stored -->
  <rect x="60" y="694" width="450" height="60" rx="4" fill="#313244" stroke="#6c7086" stroke-width="1"/>
  <text x="75" y="712" fill="#94e2d5" font-family="Consolas, monospace" font-size="11">Case ACCEPT -- stored in sampleivtree:</text>
  <text x="90" y="728" fill="#6c7086" font-family="Consolas, monospace" font-size="10">ddsi_radmin.c:2143  (*refcount_adjust)++;</text>

  <!-- Case: deliver -->
  <rect x="530" y="694" width="470" height="60" rx="4" fill="#313244" stroke="#6c7086" stroke-width="1"/>
  <text x="545" y="712" fill="#94e2d5" font-family="Consolas, monospace" font-size="11">Case DELIVER -- return consecutive chain:</text>
  <text x="560" y="728" fill="#6c7086" font-family="Consolas, monospace" font-size="10">ddsi_radmin.c:1962  (*refcount_adjust)++;</text>

  <!-- After all reorders -->
  <rect x="60" y="768" width="940" height="70" rx="4" fill="#313244" stroke="#f38ba8" stroke-width="1.5"/>
  <text x="75" y="786" fill="#94e2d5" font-family="Consolas, monospace" font-size="11">ddsi_fragchain_adjust_refcount(frag, adjust) -- per rdata in fragchain:</text>
  <text x="90" y="802" fill="#6c7086" font-family="Consolas, monospace" font-size="10">ddsi_radmin.c:913  ddsi_rdata_rmbias_and_adjust(frag, adjust);</text>
  <text x="90" y="816" fill="#6c7086" font-family="Consolas, monospace" font-size="10">ddsi_radmin.c:658  sub = RDATA_BIAS - adjust;  rmsg.refcount -= sub;</text>

  <!-- ============ PHASE 4: rmsg_commit ============ -->
  <rect x="30" y="866" width="990" height="100" rx="6" fill="#181825" stroke="#89b4fa" stroke-width="1.5"/>
  <text x="45" y="889" fill="#89b4fa" font-family="Consolas, monospace" font-size="13" font-weight="bold">Phase 4: ddsi_rmsg_commit(rmsg)</text>

  <rect x="60" y="901" width="940" height="50" rx="4" fill="#313244" stroke="#f9e2af" stroke-width="1" stroke-dasharray="4,2"/>
  <text x="75" y="921" fill="#f9e2af" font-family="Consolas, monospace" font-size="12" font-weight="bold">-UNCOMMITTED_BIAS (0x80000000)</text>
  <text x="75" y="937" fill="#6c7086" font-family="Consolas, monospace" font-size="10">ddsi_radmin.c:624  ddsrt_atomic_sub32_nv(&amp;rmsg-&gt;refcount, RMSG_REFCOUNT_UNCOMMITTED_BIAS)</text>

  <!-- ============ PHASE 5: dqueue ============ -->
  <rect x="30" y="981" width="990" height="130" rx="6" fill="#181825" stroke="#74c7ec" stroke-width="1.5"/>
  <text x="45" y="1004" fill="#74c7ec" font-family="Consolas, monospace" font-size="13" font-weight="bold">Phase 5: dqueue delivery thread</text>

  <text x="60" y="1031" fill="#cdd6f4" font-family="Consolas, monospace" font-size="11">deliver fragchain to RHC via handler callback</text>

  <rect x="60" y="1046" width="940" height="50" rx="4" fill="#313244" stroke="#f9e2af" stroke-width="1" stroke-dasharray="4,2"/>
  <text x="75" y="1066" fill="#f9e2af" font-family="Consolas, monospace" font-size="12" font-weight="bold">ddsi_fragchain_unref(fragchain): rmsg refcount-- per rdata in chain</text>
  <text x="75" y="1082" fill="#6c7086" font-family="Consolas, monospace" font-size="10">ddsi_radmin.c:1692-1700  ddsi_fragchain_unref -&gt; ddsi_rdata_unref -&gt; ddsi_rmsg_unref</text>

  <!-- ============ PHASE 6: free ============ -->
  <rect x="30" y="1126" width="990" height="75" rx="6" fill="#181825" stroke="#f38ba8" stroke-width="1.5"/>
  <text x="45" y="1149" fill="#f38ba8" font-family="Consolas, monospace" font-size="13" font-weight="bold">Phase 6: refcount == 0 -&gt; ddsi_rmsg_free(rmsg)</text>
  <text x="60" y="1171" fill="#cdd6f4" font-family="Consolas, monospace" font-size="11">free each chunk, release its rbuf, decrement n_live_rmsg_chunks</text>
  <text x="60" y="1186" fill="#6c7086" font-family="Consolas, monospace" font-size="10">ddsi_radmin.c:575-593 ddsi_rmsg_free;  ddsi_radmin.c:463-471 ddsi_rbuf_release</text>

  <!-- ============ REFCOUNT TIMELINE ============ -->
  <rect x="30" y="1221" width="990" height="360" rx="6" fill="#181825" stroke="#89b4fa" stroke-width="1"/>
  <text x="525" y="1246" fill="#89b4fa" font-family="Consolas, monospace" font-size="14" text-anchor="middle" font-weight="bold">Refcount Timeline (example: 1 rmsg, 2 rdata, 1 reorder)</text>

  <!-- Timeline axis -->
  <line x1="80" y1="1546" x2="980" y2="1546" stroke="#6c7086" stroke-width="1"/>

  <!-- Timeline labels -->
  <text x="110" y="1566" fill="#6c7086" font-family="Consolas, monospace" font-size="9" text-anchor="middle">rmsg_new</text>
  <text x="240" y="1566" fill="#6c7086" font-family="Consolas, monospace" font-size="9" text-anchor="middle">addbias</text>
  <text x="310" y="1566" fill="#6c7086" font-family="Consolas, monospace" font-size="9" text-anchor="middle">addbias</text>
  <text x="460" y="1566" fill="#6c7086" font-family="Consolas, monospace" font-size="9" text-anchor="middle">reorder</text>
  <text x="570" y="1566" fill="#6c7086" font-family="Consolas, monospace" font-size="9" text-anchor="middle">adjust</text>
  <text x="680" y="1566" fill="#6c7086" font-family="Consolas, monospace" font-size="9" text-anchor="middle">commit</text>
  <text x="790" y="1566" fill="#6c7086" font-family="Consolas, monospace" font-size="9" text-anchor="middle">unref x1</text>
  <text x="900" y="1566" fill="#6c7086" font-family="Consolas, monospace" font-size="9" text-anchor="middle">unref x1</text>

  <!-- Tick marks -->
  <line x1="110" y1="1541" x2="110" y2="1551" stroke="#6c7086" stroke-width="1"/>
  <line x1="240" y1="1541" x2="240" y2="1551" stroke="#6c7086" stroke-width="1"/>
  <line x1="310" y1="1541" x2="310" y2="1551" stroke="#6c7086" stroke-width="1"/>
  <line x1="460" y1="1541" x2="460" y2="1551" stroke="#6c7086" stroke-width="1"/>
  <line x1="570" y1="1541" x2="570" y2="1551" stroke="#6c7086" stroke-width="1"/>
  <line x1="680" y1="1541" x2="680" y2="1551" stroke="#6c7086" stroke-width="1"/>
  <line x1="790" y1="1541" x2="790" y2="1551" stroke="#6c7086" stroke-width="1"/>
  <line x1="900" y1="1541" x2="900" y2="1551" stroke="#6c7086" stroke-width="1"/>

  <!-- Refcount bars (heights proportional) -->
  <!-- U = UNCOMMITTED = 200px, R = RDATA_BIAS = 30px, actual = 15px -->

  <!-- rmsg_new: U -->
  <rect x="95" y="1336" width="30" height="200" fill="#89b4fa" opacity="0.7"/>
  <text x="110" y="1331" fill="#89b4fa" font-family="Consolas, monospace" font-size="10" text-anchor="middle">U</text>

  <!-- addbias rdata1: U + R -->
  <rect x="225" y="1336" width="30" height="200" fill="#89b4fa" opacity="0.7"/>
  <rect x="225" y="1306" width="30" height="30" fill="#fab387" opacity="0.7"/>
  <text x="240" y="1301" fill="#fab387" font-family="Consolas, monospace" font-size="10" text-anchor="middle">U+R</text>

  <!-- addbias rdata2: U + 2R -->
  <rect x="295" y="1336" width="30" height="200" fill="#89b4fa" opacity="0.7"/>
  <rect x="295" y="1276" width="30" height="60" fill="#fab387" opacity="0.7"/>
  <text x="310" y="1271" fill="#fab387" font-family="Consolas, monospace" font-size="10" text-anchor="middle">U+2R</text>

  <!-- reorder (refcount_adjust=1): U + 2R -->
  <rect x="445" y="1336" width="30" height="200" fill="#89b4fa" opacity="0.7"/>
  <rect x="445" y="1276" width="30" height="60" fill="#fab387" opacity="0.7"/>
  <text x="460" y="1271" fill="#cba6f7" font-family="Consolas, monospace" font-size="10" text-anchor="middle">U+2R</text>
  <text x="460" y="1261" fill="#6c7086" font-family="Consolas, monospace" font-size="8" text-anchor="middle">adj=1</text>

  <!-- adjust_refcount: sub = R - 1 per rdata => U + 2*1 = U + 2 -->
  <rect x="555" y="1336" width="30" height="200" fill="#89b4fa" opacity="0.7"/>
  <rect x="555" y="1306" width="30" height="30" fill="#a6e3a1" opacity="0.7"/>
  <text x="570" y="1301" fill="#a6e3a1" font-family="Consolas, monospace" font-size="10" text-anchor="middle">U+2</text>

  <!-- commit: remove U => 2 -->
  <rect x="665" y="1521" width="30" height="25" fill="#a6e3a1" opacity="0.7"/>
  <text x="680" y="1516" fill="#a6e3a1" font-family="Consolas, monospace" font-size="10" text-anchor="middle">2</text>

  <!-- unref x1: 1 -->
  <rect x="775" y="1533" width="30" height="13" fill="#a6e3a1" opacity="0.7"/>
  <text x="790" y="1528" fill="#a6e3a1" font-family="Consolas, monospace" font-size="10" text-anchor="middle">1</text>

  <!-- unref x2: 0 -->
  <text x="900" y="1528" fill="#f38ba8" font-family="Consolas, monospace" font-size="11" text-anchor="middle">0 -&gt; FREE</text>

  <!-- Legend for timeline -->
  <rect x="700" y="1316" width="12" height="12" fill="#89b4fa" opacity="0.7"/>
  <text x="718" y="1327" fill="#6c7086" font-family="Consolas, monospace" font-size="10">UNCOMMITTED_BIAS (2^31)</text>
  <rect x="700" y="1334" width="12" height="12" fill="#fab387" opacity="0.7"/>
  <text x="718" y="1345" fill="#6c7086" font-family="Consolas, monospace" font-size="10">RDATA_BIAS (2^20 each)</text>
  <rect x="700" y="1352" width="12" height="12" fill="#a6e3a1" opacity="0.7"/>
  <text x="718" y="1363" fill="#6c7086" font-family="Consolas, monospace" font-size="10">actual refs (1 each)</text>

  <!-- ============ FLOW ARROWS (left side) ============ -->
  <line x1="15" y1="150" x2="15" y2="245" stroke="#e74c3c" stroke-width="2" marker-end="url(#arrow)"/>
  <line x1="15" y1="250" x2="15" y2="621" stroke="#e74c3c" stroke-width="2" marker-end="url(#arrow)"/>
  <line x1="15" y1="626" x2="15" y2="856" stroke="#e74c3c" stroke-width="2" marker-end="url(#arrow)"/>
  <line x1="15" y1="861" x2="15" y2="971" stroke="#e74c3c" stroke-width="2" marker-end="url(#arrow)"/>
  <line x1="15" y1="976" x2="15" y2="1116" stroke="#e74c3c" stroke-width="2" marker-end="url(#arrow)"/>
  <line x1="15" y1="1121" x2="15" y2="1206" stroke="#e74c3c" stroke-width="2" marker-end="url(#arrow)"/>

  <!-- Thread labels -->
  <text x="1010" y="115" fill="#89b4fa" font-family="Consolas, monospace" font-size="9" text-anchor="end" transform="rotate(-90, 1010, 115)">recv thread</text>
  <text x="1010" y="1036" fill="#74c7ec" font-family="Consolas, monospace" font-size="9" text-anchor="end" transform="rotate(-90, 1010, 1036)">dqueue thread</text>

  <!-- Thread boundary -->
  <line x1="35" y1="973" x2="1015" y2="973" stroke="#f9e2af" stroke-width="1" stroke-dasharray="6,3"/>
  <text x="525" y="969" fill="#f9e2af" font-family="Consolas, monospace" font-size="10" text-anchor="middle">--- thread boundary (recv -&gt; dqueue) ---</text>

  <!-- ============ BOTTOM LEGEND ============ -->
  <rect x="30" y="1596" width="990" height="145" rx="6" fill="#181825" stroke="#6c7086" stroke-width="1"/>
  <text x="45" y="1621" fill="#cdd6f4" font-family="Consolas, monospace" font-size="12" font-weight="bold">Key Insight: Why RDATA_BIAS?</text>

  <text x="45" y="1644" fill="#cdd6f4" font-family="Consolas, monospace" font-size="11">Problem: rdata may go to N reorder admins. Can't know final ref count until all are done.</text>
  <text x="45" y="1662" fill="#cdd6f4" font-family="Consolas, monospace" font-size="11">Solution: addbias gives a "large credit" (2^20). Each reorder that keeps it increments</text>
  <text x="45" y="1680" fill="#cdd6f4" font-family="Consolas, monospace" font-size="11">  refcount_adjust. After all reorders: rmbias_and_adjust does ONE atomic op:</text>
  <text x="45" y="1702" fill="#f9e2af" font-family="Consolas, monospace" font-size="12">  refcount -= (RDATA_BIAS - refcount_adjust)  =  remove credit, keep actual refs</text>
  <text x="45" y="1726" fill="#6c7086" font-family="Consolas, monospace" font-size="10">This prevents the dqueue thread from freeing rmsg while recv thread still iterates readers.</text>
</svg>
