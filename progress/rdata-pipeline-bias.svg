<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1050 1540" width="1050" height="1540">
  <defs>
    <marker id="arrow" markerWidth="8" markerHeight="6" refX="8" refY="3" orient="auto">
      <path d="M0,0 L8,3 L0,6" fill="#e74c3c"/>
    </marker>
    <marker id="arrow-blue" markerWidth="8" markerHeight="6" refX="8" refY="3" orient="auto">
      <path d="M0,0 L8,3 L0,6" fill="#3498db"/>
    </marker>
    <marker id="arrow-green" markerWidth="8" markerHeight="6" refX="8" refY="3" orient="auto">
      <path d="M0,0 L8,3 L0,6" fill="#a6e3a1"/>
    </marker>
    <marker id="arrow-gray" markerWidth="8" markerHeight="6" refX="8" refY="3" orient="auto">
      <path d="M0,0 L8,3 L0,6" fill="#6c7086"/>
    </marker>
  </defs>

  <rect width="1050" height="1520" fill="#1e1e2e"/>

  <!-- Title -->
  <text x="525" y="35" fill="#cdd6f4" font-family="Consolas, monospace" font-size="18" text-anchor="middle" font-weight="bold">rdata Pipeline: defrag -&gt; reorder -&gt; dqueue</text>
  <text x="525" y="55" fill="#6c7086" font-family="Consolas, monospace" font-size="12" text-anchor="middle">rmsg refcount = UNCOMMITTED_BIAS + sum(RDATA_BIAS) + actual_refs</text>

  <!-- ============ PHASE 0: rmsg_new ============ -->
  <rect x="30" y="75" width="990" height="75" rx="6" fill="#181825" stroke="#89b4fa" stroke-width="1.5"/>
  <text x="45" y="95" fill="#89b4fa" font-family="Consolas, monospace" font-size="13" font-weight="bold">Phase 0: ddsi_rmsg_new(rbpool)</text>
  <text x="45" y="115" fill="#cdd6f4" font-family="Consolas, monospace" font-size="11">refcount initialized to UNCOMMITTED_BIAS = 0x80000000</text>
  <text x="45" y="135" fill="#6c7086" font-family="Consolas, monospace" font-size="10">ddsi_radmin.c:539  ddsrt_atomic_st32(&amp;rmsg-&gt;refcount, RMSG_REFCOUNT_UNCOMMITTED_BIAS)</text>

  <!-- ============ PHASE 1: rdata_new ============ -->
  <rect x="30" y="165" width="990" height="85" rx="6" fill="#181825" stroke="#fab387" stroke-width="1.5"/>
  <text x="45" y="185" fill="#fab387" font-family="Consolas, monospace" font-size="13" font-weight="bold">Phase 1: ddsi_rdata_new(rmsg, ...) -- per Data/DataFrag submsg</text>
  <text x="45" y="205" fill="#cdd6f4" font-family="Consolas, monospace" font-size="11">rdata allocated in chunk, with back-pointer to rmsg. refcount unchanged.</text>
  <text x="45" y="221" fill="#6c7086" font-family="Consolas, monospace" font-size="10">ddsi_radmin.c:719  if ((d = ddsi_rmsg_alloc (rmsg, sizeof (*d))) == NULL) return NULL;</text>
  <text x="45" y="237" fill="#6c7086" font-family="Consolas, monospace" font-size="10">ddsi_radmin.c:721  d-&gt;rmsg = rmsg;</text>

  <!-- ============ PHASE 2: defrag ============ -->
  <rect x="30" y="255" width="990" height="195" rx="6" fill="#181825" stroke="#a6e3a1" stroke-width="1.5"/>
  <text x="45" y="278" fill="#a6e3a1" font-family="Consolas, monospace" font-size="13" font-weight="bold">Phase 2: ddsi_defrag_rsample(defrag, rdata, sampleinfo)</text>

  <!-- addbias box -->
  <rect x="60" y="290" width="940" height="68" rx="4" fill="#313244" stroke="#f9e2af" stroke-width="1" stroke-dasharray="4,2"/>
  <text x="75" y="310" fill="#f9e2af" font-family="Consolas, monospace" font-size="12" font-weight="bold">+RDATA_BIAS (0x00100000) per rdata stored in fragtree</text>
  <text x="75" y="326" fill="#6c7086" font-family="Consolas, monospace" font-size="10">ddsi_radmin.c:1028  ddsi_rdata_addbias(rdata);</text>
  <text x="75" y="342" fill="#6c7086" font-family="Consolas, monospace" font-size="10">ddsi_radmin.c:1019  called from defrag_rsample_addiv(sample, rdata, path)</text>

  <text x="60" y="378" fill="#cdd6f4" font-family="Consolas, monospace" font-size="11">refcount = UNCOMMITTED_BIAS + N * RDATA_BIAS, where N = number of rdata stored</text>
  <text x="60" y="398" fill="#6c7086" font-family="Consolas, monospace" font-size="10">Also at: ddsi_radmin.c:1100 reorder_rsample_new, :1216 grow predeq, :1244 extend succ</text>

  <!-- Branch: incomplete vs complete -->
  <text x="60" y="428" fill="#cdd6f4" font-family="Consolas, monospace" font-size="11">if incomplete: rdata stays in fragtree, return NULL, wait for more fragments</text>
  <text x="60" y="443" fill="#cdd6f4" font-family="Consolas, monospace" font-size="11">if complete:   rsample_convert_defrag_to_reorder(), return rsample</text>

  <!-- ============ PHASE 3: reorder ============ -->
  <rect x="30" y="465" width="990" height="220" rx="6" fill="#181825" stroke="#cba6f7" stroke-width="1.5"/>
  <text x="45" y="488" fill="#cba6f7" font-family="Consolas, monospace" font-size="13" font-weight="bold">Phase 3: ddsi_reorder_rsample(&amp;sc, reorder, sample, &amp;refcount_adjust)</text>

  <text x="60" y="514" fill="#cdd6f4" font-family="Consolas, monospace" font-size="11">refcount_adjust starts at 0, initialized by caller before calling reorder</text>

  <!-- Case: stored -->
  <rect x="60" y="528" width="450" height="60" rx="4" fill="#313244" stroke="#6c7086" stroke-width="1"/>
  <text x="75" y="548" fill="#cdd6f4" font-family="Consolas, monospace" font-size="11">Case ACCEPT: stored in sampleivtree</text>
  <text x="75" y="566" fill="#6c7086" font-family="Consolas, monospace" font-size="10">ddsi_radmin.c:2143  (*refcount_adjust)++;</text>
  <text x="75" y="580" fill="#6c7086" font-family="Consolas, monospace" font-size="10">sample kept in tree, needs ref for later delivery</text>

  <!-- Case: deliver -->
  <rect x="530" y="528" width="470" height="60" rx="4" fill="#313244" stroke="#6c7086" stroke-width="1"/>
  <text x="545" y="548" fill="#cdd6f4" font-family="Consolas, monospace" font-size="11">Case DELIVER: return consecutive chain</text>
  <text x="545" y="566" fill="#6c7086" font-family="Consolas, monospace" font-size="10">ddsi_radmin.c:1962  (*refcount_adjust)++;</text>
  <text x="545" y="580" fill="#6c7086" font-family="Consolas, monospace" font-size="10">chain goes to dqueue, needs ref</text>

  <!-- After all reorders -->
  <rect x="60" y="602" width="940" height="70" rx="4" fill="#313244" stroke="#f38ba8" stroke-width="1.5"/>
  <text x="75" y="622" fill="#f38ba8" font-family="Consolas, monospace" font-size="12" font-weight="bold">ddsi_fragchain_adjust_refcount(fragchain, refcount_adjust)</text>
  <text x="75" y="640" fill="#cdd6f4" font-family="Consolas, monospace" font-size="11">For each rdata: rmsg.refcount -= (RDATA_BIAS - refcount_adjust)</text>
  <text x="75" y="658" fill="#6c7086" font-family="Consolas, monospace" font-size="10">ddsi_radmin.c:907-915 fragchain loop;  ddsi_radmin.c:658 sub = RDATA_BIAS - adjust</text>

  <!-- ============ PHASE 4: rmsg_commit ============ -->
  <rect x="30" y="700" width="990" height="100" rx="6" fill="#181825" stroke="#89b4fa" stroke-width="1.5"/>
  <text x="45" y="723" fill="#89b4fa" font-family="Consolas, monospace" font-size="13" font-weight="bold">Phase 4: ddsi_rmsg_commit(rmsg)</text>

  <rect x="60" y="735" width="940" height="50" rx="4" fill="#313244" stroke="#f9e2af" stroke-width="1" stroke-dasharray="4,2"/>
  <text x="75" y="755" fill="#f9e2af" font-family="Consolas, monospace" font-size="12" font-weight="bold">-UNCOMMITTED_BIAS (0x80000000)</text>
  <text x="75" y="771" fill="#6c7086" font-family="Consolas, monospace" font-size="10">ddsi_radmin.c:624  ddsrt_atomic_sub32_nv(&amp;rmsg-&gt;refcount, RMSG_REFCOUNT_UNCOMMITTED_BIAS)</text>

  <!-- ============ PHASE 5: dqueue ============ -->
  <rect x="30" y="815" width="990" height="130" rx="6" fill="#181825" stroke="#74c7ec" stroke-width="1.5"/>
  <text x="45" y="838" fill="#74c7ec" font-family="Consolas, monospace" font-size="13" font-weight="bold">Phase 5: dqueue delivery thread</text>

  <text x="60" y="865" fill="#cdd6f4" font-family="Consolas, monospace" font-size="11">deliver fragchain to RHC via handler callback</text>

  <rect x="60" y="880" width="940" height="50" rx="4" fill="#313244" stroke="#f9e2af" stroke-width="1" stroke-dasharray="4,2"/>
  <text x="75" y="900" fill="#f9e2af" font-family="Consolas, monospace" font-size="12" font-weight="bold">ddsi_fragchain_unref(fragchain): rmsg refcount-- per rdata in chain</text>
  <text x="75" y="916" fill="#6c7086" font-family="Consolas, monospace" font-size="10">ddsi_radmin.c:1692-1700  ddsi_fragchain_unref -&gt; ddsi_rdata_unref -&gt; ddsi_rmsg_unref</text>

  <!-- ============ PHASE 6: free ============ -->
  <rect x="30" y="960" width="990" height="75" rx="6" fill="#181825" stroke="#f38ba8" stroke-width="1.5"/>
  <text x="45" y="983" fill="#f38ba8" font-family="Consolas, monospace" font-size="13" font-weight="bold">Phase 6: refcount == 0 -&gt; ddsi_rmsg_free(rmsg)</text>
  <text x="60" y="1005" fill="#cdd6f4" font-family="Consolas, monospace" font-size="11">free each chunk, release its rbuf, decrement n_live_rmsg_chunks</text>
  <text x="60" y="1020" fill="#6c7086" font-family="Consolas, monospace" font-size="10">ddsi_radmin.c:575-593 ddsi_rmsg_free;  ddsi_radmin.c:463-471 ddsi_rbuf_release</text>

  <!-- ============ REFCOUNT TIMELINE ============ -->
  <rect x="30" y="1055" width="990" height="310" rx="6" fill="#181825" stroke="#89b4fa" stroke-width="1"/>
  <text x="525" y="1080" fill="#89b4fa" font-family="Consolas, monospace" font-size="14" text-anchor="middle" font-weight="bold">Refcount Timeline (example: 1 rmsg, 2 rdata, 1 reorder)</text>

  <!-- Timeline axis -->
  <line x1="80" y1="1330" x2="980" y2="1330" stroke="#6c7086" stroke-width="1"/>

  <!-- Timeline labels -->
  <text x="110" y="1350" fill="#6c7086" font-family="Consolas, monospace" font-size="9" text-anchor="middle">rmsg_new</text>
  <text x="240" y="1350" fill="#6c7086" font-family="Consolas, monospace" font-size="9" text-anchor="middle">addbias</text>
  <text x="310" y="1350" fill="#6c7086" font-family="Consolas, monospace" font-size="9" text-anchor="middle">addbias</text>
  <text x="460" y="1350" fill="#6c7086" font-family="Consolas, monospace" font-size="9" text-anchor="middle">reorder</text>
  <text x="570" y="1350" fill="#6c7086" font-family="Consolas, monospace" font-size="9" text-anchor="middle">adjust</text>
  <text x="680" y="1350" fill="#6c7086" font-family="Consolas, monospace" font-size="9" text-anchor="middle">commit</text>
  <text x="790" y="1350" fill="#6c7086" font-family="Consolas, monospace" font-size="9" text-anchor="middle">unref x1</text>
  <text x="900" y="1350" fill="#6c7086" font-family="Consolas, monospace" font-size="9" text-anchor="middle">unref x1</text>

  <!-- Tick marks -->
  <line x1="110" y1="1325" x2="110" y2="1335" stroke="#6c7086" stroke-width="1"/>
  <line x1="240" y1="1325" x2="240" y2="1335" stroke="#6c7086" stroke-width="1"/>
  <line x1="310" y1="1325" x2="310" y2="1335" stroke="#6c7086" stroke-width="1"/>
  <line x1="460" y1="1325" x2="460" y2="1335" stroke="#6c7086" stroke-width="1"/>
  <line x1="570" y1="1325" x2="570" y2="1335" stroke="#6c7086" stroke-width="1"/>
  <line x1="680" y1="1325" x2="680" y2="1335" stroke="#6c7086" stroke-width="1"/>
  <line x1="790" y1="1325" x2="790" y2="1335" stroke="#6c7086" stroke-width="1"/>
  <line x1="900" y1="1325" x2="900" y2="1335" stroke="#6c7086" stroke-width="1"/>

  <!-- Refcount bars (heights proportional) -->
  <!-- U = UNCOMMITTED = 200px, R = RDATA_BIAS = 30px, actual = 15px -->

  <!-- rmsg_new: U -->
  <rect x="95" y="1120" width="30" height="200" fill="#89b4fa" opacity="0.7"/>
  <text x="110" y="1115" fill="#89b4fa" font-family="Consolas, monospace" font-size="10" text-anchor="middle">U</text>

  <!-- addbias rdata1: U + R -->
  <rect x="225" y="1120" width="30" height="200" fill="#89b4fa" opacity="0.7"/>
  <rect x="225" y="1090" width="30" height="30" fill="#fab387" opacity="0.7"/>
  <text x="240" y="1085" fill="#fab387" font-family="Consolas, monospace" font-size="10" text-anchor="middle">U+R</text>

  <!-- addbias rdata2: U + 2R -->
  <rect x="295" y="1120" width="30" height="200" fill="#89b4fa" opacity="0.7"/>
  <rect x="295" y="1060" width="30" height="60" fill="#fab387" opacity="0.7"/>
  <text x="310" y="1055" fill="#fab387" font-family="Consolas, monospace" font-size="10" text-anchor="middle">U+2R</text>

  <!-- reorder (refcount_adjust=1): U + 2R -->
  <rect x="445" y="1120" width="30" height="200" fill="#89b4fa" opacity="0.7"/>
  <rect x="445" y="1060" width="30" height="60" fill="#fab387" opacity="0.7"/>
  <text x="460" y="1055" fill="#cba6f7" font-family="Consolas, monospace" font-size="10" text-anchor="middle">U+2R</text>
  <text x="460" y="1045" fill="#6c7086" font-family="Consolas, monospace" font-size="8" text-anchor="middle">adj=1</text>

  <!-- adjust_refcount: sub = R - 1 per rdata => U + 2*1 = U + 2 -->
  <rect x="555" y="1120" width="30" height="200" fill="#89b4fa" opacity="0.7"/>
  <rect x="555" y="1090" width="30" height="30" fill="#a6e3a1" opacity="0.7"/>
  <text x="570" y="1085" fill="#a6e3a1" font-family="Consolas, monospace" font-size="10" text-anchor="middle">U+2</text>

  <!-- commit: remove U => 2 -->
  <rect x="665" y="1305" width="30" height="25" fill="#a6e3a1" opacity="0.7"/>
  <text x="680" y="1300" fill="#a6e3a1" font-family="Consolas, monospace" font-size="10" text-anchor="middle">2</text>

  <!-- unref x1: 1 -->
  <rect x="775" y="1317" width="30" height="13" fill="#a6e3a1" opacity="0.7"/>
  <text x="790" y="1312" fill="#a6e3a1" font-family="Consolas, monospace" font-size="10" text-anchor="middle">1</text>

  <!-- unref x2: 0 -->
  <text x="900" y="1312" fill="#f38ba8" font-family="Consolas, monospace" font-size="11" text-anchor="middle">0 -&gt; FREE</text>

  <!-- Legend for timeline -->
  <rect x="700" y="1100" width="12" height="12" fill="#89b4fa" opacity="0.7"/>
  <text x="718" y="1111" fill="#6c7086" font-family="Consolas, monospace" font-size="10">UNCOMMITTED_BIAS (2^31)</text>
  <rect x="700" y="1118" width="12" height="12" fill="#fab387" opacity="0.7"/>
  <text x="718" y="1129" fill="#6c7086" font-family="Consolas, monospace" font-size="10">RDATA_BIAS (2^20 each)</text>
  <rect x="700" y="1136" width="12" height="12" fill="#a6e3a1" opacity="0.7"/>
  <text x="718" y="1147" fill="#6c7086" font-family="Consolas, monospace" font-size="10">actual refs (1 each)</text>

  <!-- ============ FLOW ARROWS (left side) ============ -->
  <line x1="15" y1="150" x2="15" y2="245" stroke="#e74c3c" stroke-width="2" marker-end="url(#arrow)"/>
  <line x1="15" y1="250" x2="15" y2="455" stroke="#e74c3c" stroke-width="2" marker-end="url(#arrow)"/>
  <line x1="15" y1="460" x2="15" y2="690" stroke="#e74c3c" stroke-width="2" marker-end="url(#arrow)"/>
  <line x1="15" y1="695" x2="15" y2="805" stroke="#e74c3c" stroke-width="2" marker-end="url(#arrow)"/>
  <line x1="15" y1="810" x2="15" y2="950" stroke="#e74c3c" stroke-width="2" marker-end="url(#arrow)"/>
  <line x1="15" y1="955" x2="15" y2="1040" stroke="#e74c3c" stroke-width="2" marker-end="url(#arrow)"/>

  <!-- Thread labels -->
  <text x="1010" y="115" fill="#89b4fa" font-family="Consolas, monospace" font-size="9" text-anchor="end" transform="rotate(-90, 1010, 115)">recv thread</text>
  <text x="1010" y="870" fill="#74c7ec" font-family="Consolas, monospace" font-size="9" text-anchor="end" transform="rotate(-90, 1010, 870)">dqueue thread</text>

  <!-- Thread boundary -->
  <line x1="35" y1="807" x2="1015" y2="807" stroke="#f9e2af" stroke-width="1" stroke-dasharray="6,3"/>
  <text x="525" y="803" fill="#f9e2af" font-family="Consolas, monospace" font-size="10" text-anchor="middle">--- thread boundary (recv -&gt; dqueue) ---</text>

  <!-- ============ BOTTOM LEGEND ============ -->
  <rect x="30" y="1380" width="990" height="145" rx="6" fill="#181825" stroke="#6c7086" stroke-width="1"/>
  <text x="45" y="1405" fill="#cdd6f4" font-family="Consolas, monospace" font-size="12" font-weight="bold">Key Insight: Why RDATA_BIAS?</text>

  <text x="45" y="1428" fill="#cdd6f4" font-family="Consolas, monospace" font-size="11">Problem: rdata may go to N reorder admins. Can't know final ref count until all are done.</text>
  <text x="45" y="1446" fill="#cdd6f4" font-family="Consolas, monospace" font-size="11">Solution: addbias gives a "large credit" (2^20). Each reorder that keeps it increments</text>
  <text x="45" y="1464" fill="#cdd6f4" font-family="Consolas, monospace" font-size="11">  refcount_adjust. After all reorders: rmbias_and_adjust does ONE atomic op:</text>
  <text x="45" y="1486" fill="#f9e2af" font-family="Consolas, monospace" font-size="12">  refcount -= (RDATA_BIAS - refcount_adjust)  =  remove credit, keep actual refs</text>
  <text x="45" y="1510" fill="#6c7086" font-family="Consolas, monospace" font-size="10">This prevents the dqueue thread from freeing rmsg while recv thread still iterates readers.</text>
</svg>
